name: Build and Release LuxeBill

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Package app
        run: npx electron-builder

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LuxeBill-${{ matrix.os }}
          path: dist/**
