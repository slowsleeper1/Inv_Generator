name: Build and Release LuxeBill

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Fix npm optional dependency issues (Tailwind / native bindings)
      - name: Fix npm optional dependencies
        run: npm config set optional true

      # Clean install (avoids corrupted installs in CI)
      - name: Install dependencies (fixed)
        run: |
          rm -rf node_modules package-lock.json
          npm install --force

      # Rebuild native modules (critical for Tailwind oxide)
      - name: Rebuild native modules
        run: npm rebuild

      # Build your frontend (Vite)
      - name: Build app
        run: npm run build

      # Package Electron app
      - name: Package app
        run: npx electron-builder

      # Upload build artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LuxeBill-${{ matrix.os }}
          path: |
            dist/**
            dist-electron/**
            release/**
